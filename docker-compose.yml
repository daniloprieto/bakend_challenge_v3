services:
  postgres:
    image: postgres:18.3-alpine
    container_name: emergencias_challenge_postgres
    environment:
      POSTGRES_DB: emergencias_challenge
      POSTGRES_PASSWORD: challenge
      POSTGRES_USER: challenge
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U challenge -d emergencias_challenge']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
